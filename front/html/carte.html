<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EliVolt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
  <link href="../css/style-front.css" rel="stylesheet" />
</head>
<body>

<nav class="ev-nav">
  <a href="../index.html" class="brand">
    <img src="../../ressources/img/logo.jpeg" alt="Logo Elivolt" class="brand-logo">
    <span class="brand-name">EliVolt</span>
  </a>
  <div class="nav-links">
    <a href="../index.html">Accueil</a>
    <a href="recherche.html">Recherche</a>
    <a href="carte.html" class="active">Carte</a>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Ouvrir le menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-mobile" id="navMobile">
  <a href="../index.html">Accueil</a>
  <a href="recherche.html">Recherche</a>
  <a href="carte.html" class="active">Carte</a>
</div>

<main class="flex-grow-1">

  <div class="container-xl px-4 pt-4 pb-4">

    <div class="carte-title-row mb-4">
      <h1 class="page-title">Carte interactive</h1>
      <p class="section-subtitle">—</p>
      <p class="section-subtitle">Visualisez les points de recharge en Bretagne</p>
    </div>

    <!-- Filtres -->
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">Année d'installation</span>
        <div class="filter-select-wrap">
          <select id="recherche-carte-annee"></select>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Département</span>
        <div class="filter-select-wrap">
          <select id="recherche-carte-departement"></select>
        </div>
      </div>
      <div class="filter-group filter-group--btn">
        <span class="filter-label filter-label--hidden">Action</span>
        <button class="filter-btn">
          <i class="fa fa-magnifying-glass"></i>Rechercher
        </button>
      </div>
    </div>
  </div>

  <!-- Carte pleine largeur -->
  <div class="map-fullwidth-wrap">
    <div id="map"></div>
  </div>

</main>

<footer class="ev-footer">
  <span>ZADOROZNYJ Lia / FEUARDENT Emma — Groupe CIN2</span>
  <span>2026</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/carte.js"></script>
<script>
  const toggle = document.getElementById('navToggle');
  const menu   = document.getElementById('navMobile');
  toggle.addEventListener('click', () => menu.classList.toggle('open'));
</script>
</body>
</html>
