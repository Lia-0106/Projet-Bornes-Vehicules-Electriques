<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BretagneCharge — Carte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
  <link href="../css/style-front.css" rel="stylesheet" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/carte.js" defer></script>
</head>
<body>

<nav class="bc-navbar py-2">
  <div class="container-xl px-4 d-flex align-items-center justify-content-between">
    <a href="../index.html" class="d-flex align-items-center gap-2 text-decoration-none">
      <div class="bc-logo-box"><img src="../img/logo.jpeg" alt="Logo BretagneCharge" /></div>
      <span class="fw-semibold text-white brand-text">Bretagne<span class="brand-highlight">Charge</span></span>
    </a>
    <div class="d-flex align-items-center gap-2">
        <a href="../index.html" class="nav-link-custom">Accueil</a>
        <a href="recherche.html" class="nav-link-custom">Recherche</a>
        <a href="carte.html" class="nav-link-custom active">Carte</a>
    </div>
  </div>
</nav>

<main class="container-xl px-4 pt-5 pb-5 flex-grow-1">
  <h1 class="h3 fw-bold mb-1">Formulaire de recherche</h1>
  <p class="mb-4 section-subtitle">Filtrez les points de recharge selon vos critères</p>

  <!-- Filtres -->
  <div class="bc-card p-4 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-sm-6 col-md-4">
        <label class="form-label-custom">Année d'installation</label>
        <select id="recherche-carte-annee" class="form-select">
        </select>
      </div>
      <div class="col-sm-6 col-md-4">
        <label class="form-label-custom">Département</label>
        <select id="recherche-carte-departement" class="form-select">
        </select>
      </div>
      <div class="col-sm-12 col-md-2">
        <button class="btn-search">
          <i class="fa fa-magnifying-glass me-2"></i>Rechercher
        </button>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

</main>

<footer class="bc-footer">
  <div class="container-xl px-4 d-flex justify-content-between">
    <span>ZADOROZNYJ Lia / FEUARDENT Emma — Groupe 7</span><span>2026</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
