<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BretagneCharge — Carte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
  <style>
    :root {
      --purple: #7c3aed;
      --purple-dim: #a78bfa;
      --card-bg: #161616;
      --border: #222;
      --muted: #6b7280;
      --muted-light: #9ca3af;
    }
    body { background: #0d0d0d; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .bc-navbar { background: #0d0d0d; border-bottom: 1px solid var(--border); position: relative; z-index: 10; }
    .nav-link-custom { color: var(--muted-light); text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: .95rem; font-weight: 500; transition: all 0.2s; }
    .nav-link-custom:hover { color: #fff; background: #1e1e1e; }
    .nav-link-custom.active { color: #fff; background: rgba(124,58,237,.18); }
    .bc-logo-box { width: 34px; height: 34px; background: var(--purple); border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
    .bc-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }
    .form-select {
      background-color: #1e1e1e;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23999' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
      border-color: #303030; color: #fff; border-radius: 8px;
    }
    .form-select:focus { background-color: #1e1e1e; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.2); color: #fff; }
    .form-select option { background: #1e1e1e; }
    #map { height: 560px; border-radius: 12px; border: 1px solid var(--border); }
    .leaflet-container { background: #b2dfdb; }
    .bc-footer { border-top: 1px solid var(--border); color: var(--muted); font-size: .78rem; padding: 14px 0; margin-top: auto; }
  </style>
</head>
<body>

<nav class="bc-navbar py-2">
  <div class="container-xl px-4 d-flex align-items-center justify-content-between">
    <a href="../index.html" class="d-flex align-items-center gap-2 text-decoration-none">
      <div class="bc-logo-box"><i class="fa fa-bolt text-white" style="font-size:13px;"></i></div>
      <span class="fw-semibold text-white" style="font-size:.97rem;">Bretagne<span style="color:#a78bfa;">Charge</span></span>
    </a>
    <div class="d-flex align-items-center gap-2">
        <a href="../index.html" class="nav-link-custom">Accueil</a>
        <a href="recherche.html" class="nav-link-custom">Recherche</a>
        <a href="carte.html" class="nav-link-custom active">Carte</a>
    </div>
  </div>
</nav>

<main class="container-xl px-4 pt-5 pb-5 flex-grow-1">
  <h1 class="h3 fw-bold mb-1">Formulaire de recherche</h1>
  <p class="mb-4" style="color:#9ca3af; font-size:.88rem;">Filtrez les points de recharge selon vos critères</p>

  <!-- Filtres -->
  <div class="bc-card p-4 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-sm-6 col-md-4">
        <label class="d-block mb-1" style="font-size:.76rem; color:#9ca3af;">Année d'installation</label>
        <select class="form-select">
          <option>Tous</option><option>2020</option><option>2021</option><option>2022</option><option>2023</option>
        </select>
      </div>
      <div class="col-sm-6 col-md-4">
        <label class="d-block mb-1" style="font-size:.76rem; color:#9ca3af;">Département</label>
        <select class="form-select">
          <option>Tous</option><option>22 — Côtes-d'Armor</option><option>29 — Finistère</option><option>35 — Ille-et-Vilaine</option><option>56 — Morbihan</option>
        </select>
      </div>
      <div class="col-sm-12 col-md-2">
        <button class="btn w-100 py-2" style="background:var(--purple); color:#fff; border:none; border-radius:8px; font-size:.88rem;">
          <i class="fa fa-magnifying-glass me-2"></i>Rechercher
        </button>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

</main>

<footer class="bc-footer">
  <div class="container-xl px-4 d-flex justify-content-between">
    <span>NOM Prénom — Groupe</span><span>2026</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', { zoomControl: true }).setView([48.1, -2.9], 8);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  // Exemples de points de recharge en Bretagne
  const stations = [
    [48.117, -1.678],[48.390, -4.486],[47.997, -4.097],[47.748, -3.366],
    [48.514, -2.766],[47.658, -2.762],[48.649, -2.025],[48.731, -3.460],
    [48.111, -1.300],[48.295, -4.550],[47.872, -4.130],[48.020, -3.350],
    [48.445, -1.780],[47.990, -3.995],[48.200, -2.100],[48.660, -3.200],
    [47.980, -4.500],[48.570, -2.400],[48.090, -1.560],[48.330, -3.900],
    [47.820, -2.990],[48.460, -4.100],[47.700, -3.100],[48.790, -3.000],
    [47.630, -2.500],[48.150, -3.700],[48.500, -1.900],[47.880, -4.380],
    [48.240, -1.850],[48.080, -2.850],[47.760, -3.820],[48.410, -3.020],
    [48.680, -2.870],[47.530, -2.760],[48.340, -2.620],[48.130, -4.230],
  ];

  const dotStyle = { radius: 4, fillColor: '#ef4444', color: '#c53030', weight: 1, opacity: 1, fillOpacity: 0.85 };

  stations.forEach(coords => L.circleMarker(coords, dotStyle).addTo(map));
</script>
</body>
</html>
