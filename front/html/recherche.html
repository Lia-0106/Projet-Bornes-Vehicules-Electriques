<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BretagneCharge — Recherche</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="../css/style-front.css" rel="stylesheet" />
</head>
<body>

<nav class="bc-navbar py-2">
  <div class="container-xl px-4 d-flex align-items-center justify-content-between">
    <a href="../index.html" class="d-flex align-items-center gap-2 text-decoration-none">
      <div class="bc-logo-box"><img src="../img/logo.jpeg" alt="Logo BretagneCharge" /></div>
      <span class="fw-semibold text-white brand-text">Bretagne<span class="brand-highlight">Charge</span></span>
    </a>
    <div class="d-flex align-items-center gap-2">
        <a href="../index.html" class="nav-link-custom">Accueil</a>
        <a href="recherche.html" class="nav-link-custom active">Recherche</a>
        <a href="carte.html" class="nav-link-custom">Carte</a>
    </div>
  </div>
</nav>

<main class="container-xl px-4 pt-5 pb-4 flex-grow-1">
  <h1 class="h3 fw-bold mb-1">Formulaire de recherche</h1>
  <p class="mb-4 section-subtitle">Filtrez les points de recharge selon vos critères</p>

  <div class="bc-card p-4 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label-custom">Aménageur</label>
        <select class="form-select">
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label-custom">Type de prise</label>
        <select class="form-select">
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label-custom">Département</label>
        <select class="form-select">
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn-search">
          <i class="fa fa-magnifying-glass me-2"></i>Rechercher
        </button>
      </div>
    </div>
  </div>

  <div class="bc-card overflow-hidden">
    <div class="table-header-flex">
      <span class="table-title">Résultats</span>
      <span class="table-badge">X points de recharge</span>
    </div>
    <div class="table-responsive">
      <table class="table bc-table mb-0">
        <thead>
          <tr>
            <th>Date de mise en service</th><th>Type de prise</th><th>Puissance (kW)</th><th>Localisation</th><th>Détails</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer class="bc-footer">
  <div class="container-xl px-4 d-flex justify-content-between">
    <span>ZADOROZNYJ Lia / FEUARDENT Emma — Groupe 7</span><span>2026</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
